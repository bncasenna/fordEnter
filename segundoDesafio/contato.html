<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ford Brasil - Contato</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header">
        <img class="logoHeader" src="img/logoFord.png" alt="Logo oficial da Ford">

        <nav aria-label="navegação principal">
            <ul class="navList">
                <li><a href="index.html">Home</a></li>
                <li><a href="lançamentos.html">Lançamentos</a></li>
                <li><a href="contato.html" class="active">Contato</a></li> 
            </ul>
        </nav>
    </header>

    <main>
        <section class="parallax">
            <div class="parallaxInner">
                <div class="contatoForm">
                    <h2>Sobre Você</h2>
                    <form action="#" method="POST">
                        <div class="campo">
                            <input type="text" id="nome" name="nome" placeholder="NOME DE USUÁRIO*" required>
                        </div>

                        <div class="campo">
                            <input type="email" id="email" name="email" placeholder="E-MAIL*" required>
                        </div>

                        <div class="campo">
                            <input type="tel" id="telefone" name="telefone" placeholder="TELEFONE*" required>
                        </div>

                        <div class="campo">
                            <select id="Contato" name="tipoContato" required>
                                <option value="" disabled selected>TIPO DE CONTATO?</option>
                                <option value="elogio">Elogio</option>
                                <option value="reclamacao">Reclamação</option>
                                <option value="solicitacao">Solicitação</option>
                            </select>
                        </div>

                        <div class="campo">
                            <textarea id="mensagem" name="mensagem" placeholder="MENSAGEM" rows="4"></textarea>
                        </div>

                        <button type="submit" class="btnContato">Enviar</button>
                    </form>
                </div>
            </div>
        </section>

        <div class="margin">
             <p>A nova Ford Ranger Black traz um design exclusivo e robusto, focada em quem busca sofisticação e performance em um só veículo.</p>
        </div>
    </main>

    <footer class="footer">
        <div class="footerContent">
            <div class="socialSide">
                <span>REDES SOCIAIS</span>
                <ul class="socialLinks">
                    <li>
                        <a target="_blank" href="https://www.facebook.com/FordBrasil">
                            <img src="img/facebookLogo.png" alt="Facebook">
                        </a>
                    </li>
                    <li>
                        <a target="_blank" href="https://www.instagram.com/fordbrasil">
                            <img src="img/instagramLogo.png" alt="Instagram">
                        </a>
                    </li>
                    <li>
                        <a target="_blank" href="https://www.youtube.com/@fordbrasil">
                            <img src="img/youtubeLogo.png" alt="Youtube">
                        </a>
                    </li>
                </ul>
            </div>
            
            <div class="copyright">
                <span>&copy; 2026 Ford. Todos os direitos reservados.</span>
            </div>

            <div class="footerLogo">
                <img src="img/ford.png" alt="Logo Ford">
            </div>
        </div>
    </footer>
</body>
</html>
